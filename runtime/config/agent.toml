# 小女仆机器人 Agent 策略（非敏感，可随 release 分发）。
#
# 旧版本兼容：
# - 默认模型路线统一使用 OpenAI GPT-5.6 Luna；如需其他模型，直接修改下方 route。
# - 高级用户可按需修改 model_routes / search_routes；显式声明会覆盖同名内置路线。
# - 如果 scenes.*.tool_calling_enabled 省略，会继承旧开关：
#   私聊继承 TOOL_CALLING_ENABLED，群聊继承 TOOL_CALLING_GROUP_ENABLED。
# - 如果 scenes.*.enabled_tools 省略，私聊默认开放全部业务 Tool；
#   群聊完整 Tool Loop 使用群场景白名单；关闭完整 Tool Loop 时，仅 save_memory
#   可通过 Memory-only 受控路径暴露，其他查询或写工具不会开放。
# - 如果默认 config/agent.toml 缺失，会回退到旧环境变量内置策略。
#
# 不要在这里写 API Key、Access Token、私有 Base URL、真实 prompt、用户资料、群资料、
# openid、群 ID、聊天记录、SQLite 路径或日志路径。
version = 1

# 可声明非敏感的 OpenAI-compatible provider 元数据；真实 API key 仍只从环境变量读取。
# 下面注册 MiMo provider，并将它放入默认降级候选；未配置 MIMO_API_KEY 时会跳过该候选。
# Gemini 是内置 provider，不需要在 [providers.*] 声明；配置 GEMINI_API_KEY 后可直接
# 在模型路线或搜索路线里使用 gemini: 前缀。
[providers.mimo]
kind = "openai_compatible"
base_url = "https://api.xiaomimimo.com/v1"
api_key_env = "MIMO_API_KEY"
auth_header = "Authorization"
auth_scheme = "Bearer"

# 默认将私聊、群聊和辅助任务的第一候选统一到 GPT-5.6 Luna，
# 同时保留 Gemini、MiMo 和 DeepSeek 降级候选；未配置对应 API Key 的 provider 会被跳过。
# 此处显式 route 会覆盖 PRIVATE_LLM_MODEL / GROUP_LLM_MODEL / LLM_MODEL 生成的兼容路线。
# API Key 仍必须放在 .env 的 OPENAI_API_KEY，不得写入本文件。
[model_routes.private_main]
candidates = ["openai:gpt-5.6-luna", "gemini:gemini-2.5-pro", "mimo:mimo-v2.5-pro", "deepseek:deepseek-chat"]

[model_routes.group_main]
candidates = ["openai:gpt-5.6-luna", "gemini:gemini-2.5-flash", "mimo:mimo-v2.5", "deepseek:deepseek-chat"]

[model_routes.aux]
candidates = ["openai:gpt-5.6-luna", "gemini:gemini-2.5-flash", "mimo:mimo-v2.5", "deepseek:deepseek-chat"]

# /查 统一使用 GPT-5.6 Luna 的 OpenAI Responses web_search。
# 显式 search route 会覆盖 PRIVATE/GROUP_OPENAI_SEARCH_MODEL 和 OPENAI_SEARCH_MODEL。
[search_routes.private_search]
model = "gpt-5.6-luna"

[search_routes.group_search]
model = "gpt-5.6-luna"

# 如需将 /查 切换到 Gemini Google Search，可将上方同名 route 改为：
# [search_routes.private_search]
# model = "gemini:gemini-2.5-flash"
#
# [search_routes.group_search]
# model = "gemini:gemini-2.5-flash"

# fast / balanced / deep 是可复用档位；main_route 引用内置或显式声明的模型路线。
# aux_route 是辅助模型路线名，当前用于会话标题等辅助任务；会话标题在省略时继承 main_route。
[profiles.fast]
main_route = "group_main"
aux_route = "aux"
reasoning_effort = "low"
max_tool_rounds = 2
max_output_tokens = 1200

[profiles.balanced]
main_route = "private_main"
aux_route = "aux"
reasoning_effort = "medium"
max_tool_rounds = 5
max_output_tokens = 1200

[profiles.deep]
main_route = "private_main"
aux_route = "aux"
reasoning_effort = "high"
max_tool_rounds = 8
max_output_tokens = 2400

# 私聊普通聊天：默认 balanced，并允许白名单 Tool Loop。
[scenes.private]
enabled = true
profile = "balanced"
main_route = "private_main"
search_route = "private_search"
tool_calling_enabled = true
# enabled_tools = [
#   "get_weather",
#   "get_train_schedule",
#   "get_rss_recent_items",
#   "manage_rss_subscriptions",
#   "web_search",
#   "list_todos",
#   "get_todo",
#   "create_todo",
#   "complete_todos",
#   "edit_todo",
#   "manage_recurring_reminder",
#   "restore_todos",
#   "delete_todos",
#   "merge_todos",
#   "save_memory",
# ]

# 群聊普通聊天：默认 fast，完整 Tool Loop 默认关闭；save_memory 保留 Memory-only 路径。
# 确需开启完整群聊 Tool Loop 时，先确认群聊白名单、权限边界和敏感信息脱敏。
# 默认群聊白名单不包含 Todo；如需开放 Todo 查询，请显式加入 list_todos / get_todo，
# 并先确认群聊 Todo owner 语义符合预期。
[scenes.group]
enabled = true
profile = "fast"
main_route = "group_main"
search_route = "group_search"
tool_calling_enabled = false
enabled_tools = ["get_weather", "get_train_schedule", "get_rss_recent_items", "manage_rss_subscriptions", "web_search", "save_memory"]
