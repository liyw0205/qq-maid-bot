name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Manual package version name"
        required: false
        default: "dev"

permissions:
  contents: read

jobs:
  # ==========================================================================
  # preflight：在矩阵构建前完成所有 tag 合法性检查
  #   - workflow_dispatch：直接放行构建，但不发布
  #   - tag push：校验 master 祖先 + 非纯文档，任一不通过则拒绝
  # ==========================================================================
  preflight:
    name: Preflight check
    runs-on: ubuntu-latest
    outputs:
      allow_build: ${{ steps.check.outputs.allow_build }}
      allow_publish: ${{ steps.check.outputs.allow_publish }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # 需要完整历史以解析 tag 和 diff

      - name: Preflight checks
        id: check
        shell: bash
        run: |
          # 默认拒绝，安全优先
          allow_build="false"
          allow_publish="false"

          # ---- workflow_dispatch：手动打包，不做 tag 校验 ----
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            allow_build="true"
            allow_publish="false"
            echo "allow_build=${allow_build}" >> "$GITHUB_OUTPUT"
            echo "allow_publish=${allow_publish}" >> "$GITHUB_OUTPUT"
            echo "Manual workflow_dispatch — skipping tag preflight checks"
            exit 0
          fi

          # ================================================================
          # 以下是 tag push 的校验逻辑
          # ================================================================

          # 1. 安全解析 tag 为 commit（兼容轻量 tag 和 annotated tag）
          tag_commit=$(git rev-list -n 1 "${{ github.ref_name }}")
          echo "Tag ${{ github.ref_name }} resolves to commit ${tag_commit}"

          # 2. 校验 tag commit 属于 master 祖先
          git fetch origin master --depth=1
          if ! git merge-base --is-ancestor "${tag_commit}" origin/master; then
            echo "::error::Tag ${{ github.ref_name }} 不在 master 分支上，拒绝构建和发布"
            echo "::error::请确认 tag 打在 master 上：git checkout master && git tag ${{ github.ref_name }}"
            exit 1
          fi
          echo "Tag ${{ github.ref_name }} is on master ✓"

          # 3. 获取第一父提交（用于 diff）
          #    对 merge commit，^1 是 master 在被合并前的 HEAD
          #    对普通 commit，^1 是上一个 commit
          parent=$(git rev-parse "${tag_commit}^1" 2>/dev/null) || true
          if [[ -z "${parent}" ]]; then
            echo "::error::无法获取 tag commit 的父提交（可能是 root commit），拒绝构建"
            exit 1
          fi
          echo "Parent commit: ${parent}"

          # 4. diff 第一父提交 .. tag commit
          changed_files=$(git diff --name-only "${parent}" "${tag_commit}")
          if [[ -z "${changed_files}" ]]; then
            echo "::error::tag commit 相对父提交无变更文件，拒绝构建"
            exit 1
          fi
          echo "Changed files:"
          echo "${changed_files}"

          # 5. 判断是否存在非文档/非忽略路径的变更
          #    忽略列表：docs/、.md、ISSUE_TEMPLATE、PULL_REQUEST_TEMPLATE、LICENSE、dist/
          ignore_pattern='^docs/|\.md$|^\.github/ISSUE_TEMPLATE/|^\.github/PULL_REQUEST_TEMPLATE\.md$|^LICENSE$|^dist/'
          has_code_changes=false

          while IFS= read -r file; do
            if ! echo "${file}" | grep -qE "${ignore_pattern}"; then
              has_code_changes=true
              echo "Non-doc change detected: ${file}"
              break
            fi
          done <<< "${changed_files}"

          if [[ "${has_code_changes}" == "true" ]]; then
            allow_build="true"
            allow_publish="true"
            echo "Valid release tag — allowing build and publish"
          else
            allow_build="false"
            allow_publish="false"
            echo "Pure doc tag — skipping build and release"
          fi

          echo "allow_build=${allow_build}" >> "$GITHUB_OUTPUT"
          echo "allow_publish=${allow_publish}" >> "$GITHUB_OUTPUT"

  # ==========================================================================
  # build-package：5 平台矩阵构建
  #   仅当 preflight 输出 allow_build == 'true' 时执行
  # ==========================================================================
  build-package:
    name: Build ${{ matrix.target_triple }}
    needs: preflight
    if: needs.preflight.outputs.allow_build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_triple: linux-x86_64
            build_target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_format: tar.gz
            setup: native

          - target_triple: linux-aarch64
            build_target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive_format: tar.gz
            setup: linux-cross

          - target_triple: windows-x86_64
            build_target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_format: zip
            setup: native

          - target_triple: macos-arm64
            build_target: aarch64-apple-darwin
            os: macos-latest
            archive_format: tar.gz
            setup: native

          - target_triple: android-arm64-v8a
            build_target: aarch64-linux-android
            os: ubuntu-latest
            archive_format: tar.gz
            setup: android-ndk

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # ---- Windows 打包依赖（Git Bash 默认不含 zip） ----
      - name: Install zip (Windows)
        if: runner.os == 'Windows'
        run: choco install zip -y --no-progress

      # ---- Linux aarch64 交叉编译 toolchain ----
      - name: Install Linux aarch64 cross toolchain
        if: matrix.setup == 'linux-cross'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Add Linux aarch64 target
        if: matrix.setup == 'linux-cross'
        run: rustup target add "${{ matrix.build_target }}"

      - name: Configure Linux aarch64 linker
        if: matrix.setup == 'linux-cross'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "${GITHUB_ENV}"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "${GITHUB_ENV}"

      # ---- Android arm64-v8a NDK toolchain ----
      - name: Install Android NDK
        if: matrix.setup == 'android-ndk'
        run: |
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.0.12077973" >> "${GITHUB_ENV}"

      - name: Add Android target
        if: matrix.setup == 'android-ndk'
        run: rustup target add "${{ matrix.build_target }}"

      - name: Configure Android linker
        if: matrix.setup == 'android-ndk'
        run: |
          TOOLCHAIN="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${TOOLCHAIN}/aarch64-linux-android24-clang" >> "${GITHUB_ENV}"
          echo "CC_aarch64_linux_android=${TOOLCHAIN}/aarch64-linux-android24-clang" >> "${GITHUB_ENV}"
          echo "CXX_aarch64_linux_android=${TOOLCHAIN}/aarch64-linux-android24-clang++" >> "${GITHUB_ENV}"
          echo "AR_aarch64_linux_android=${TOOLCHAIN}/llvm-ar" >> "${GITHUB_ENV}"

      # ---- Cargo 缓存 ----
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.build_target }}

      # ---- 构建 ----
      - name: Build release binaries
        shell: bash
        run: |
          if [[ "${{ matrix.setup }}" == "native" ]]; then
            cargo build --workspace --release --all-features
          else
            cargo build --workspace --release --all-features --target "${{ matrix.build_target }}"
          fi

      # ---- 版本号 ----
      - name: Select package version
        id: package
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="${{ inputs.version }}"
          fi
          printf 'version=%s\n' "${version}" >> "${GITHUB_OUTPUT}"

      # ---- 打包 ----
      - name: Build runtime package
        shell: bash
        run: |
          export TARGET_TRIPLE="${{ matrix.target_triple }}"
          export ARCHIVE_FORMAT="${{ matrix.archive_format }}"
          # 原生构建产物在 target/release/；交叉编译产物在 target/<triple>/release/。
          if [[ "${{ matrix.setup }}" != "native" ]]; then
            export BUILD_TARGET="${{ matrix.build_target }}"
          fi
          bash scripts/package-release.sh "${{ steps.package.outputs.version }}"

      # ---- 上传 artifact ----
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: qq-maid-bot-${{ steps.package.outputs.version }}-${{ matrix.target_triple }}
          path: |
            dist/qq-maid-bot-${{ steps.package.outputs.version }}-${{ matrix.target_triple }}.${{ matrix.archive_format }}
            dist/qq-maid-bot-${{ steps.package.outputs.version }}-${{ matrix.target_triple }}.${{ matrix.archive_format }}.sha256
          if-no-files-found: error

  # ==========================================================================
  # publish-release：创建 GitHub Release
  #   仅当是 tag push 且 preflight 允许发布时执行
  #   needs build-package 保证 artifact 准备就绪；若 build-package 被跳过
  #   （纯文档 tag），publish-release 也会被自动跳过
  # ==========================================================================
  publish-release:
    name: Publish GitHub Release
    needs: [preflight, build-package]
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      needs.preflight.outputs.allow_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all package artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/qq-maid-bot-${{ github.ref_name }}-*.tar.gz
            dist/qq-maid-bot-${{ github.ref_name }}-*.tar.gz.sha256
            dist/qq-maid-bot-${{ github.ref_name }}-*.zip
            dist/qq-maid-bot-${{ github.ref_name }}-*.zip.sha256
